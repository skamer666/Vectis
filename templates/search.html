{% extends "base.html" %}
{% block content %}
<div class="container">
  <section class="hero" style="padding-block:var(--space-2xl) var(--space-2xl);">
    <div class="hero-eyebrow">{{ ui.search_title }}</div>
    <h1>{{ ui.search_title }}</h1>
    <form class="search-box" id="search-form" onsubmit="return false;">
      <input type="text" id="search-input" name="q" placeholder="{{ ui.search_placeholder }}" autocomplete="off">
      <button type="submit">{{ ui.search_button }}</button>
    </form>
  </section>
  <section class="section" style="padding-top:0;">
    <p id="search-status" class="lede"></p>
    <div class="registry" id="search-results"></div>
  </section>
</div>
<script>
(function() {
  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results');
  var status = document.getElementById('search-status');
  var noResultsText = {{ ui.no_results | tojson }};
  var resultsForText = {{ ui.search_results_for | tojson }};
  var indexUrl = {{ search_index_url | tojson }};
  var data = null;

  function normalize(s) {
    return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  }

  function render(query) {
    if (!data) return;
    var q = normalize(query);
    var matches = q ? data.filter(function(item) {
      return normalize(item.nom).indexOf(q) !== -1 ||
             normalize(item.etude || '').indexOf(q) !== -1 ||
             normalize(item.ville || '').indexOf(q) !== -1;
    }) : [];
    results.innerHTML = '';
    if (!q) { status.textContent = ''; return; }
    status.textContent = resultsForText + ' « ' + query + ' » (' + matches.length + ')';
    if (matches.length === 0) { status.textContent = noResultsText; return; }
    matches.slice(0, 100).forEach(function(item) {
      var a = document.createElement('a');
      a.className = 'registry-row';
      a.href = item.url;
      a.innerHTML = '<div><div class="registry-name">' + item.nom + '</div></div>' +
        '<div class="registry-firm">' + (item.etude || '') + '</div>' +
        '<div class="registry-city">' + (item.ville || '') + '</div>';
      results.appendChild(a);
    });
  }

  var params = new URLSearchParams(window.location.search);
  var initialQ = params.get('q') || '';
  input.value = initialQ;

  fetch(indexUrl).then(function(r) { return r.json(); }).then(function(json) {
    data = json;
    render(input.value);
  });

  input.addEventListener('input', function() { render(input.value); });
})();
</script>
{% endblock %}
