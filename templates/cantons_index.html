{% extends "base.html" %}
{% block content %}
<div class="container">
  <section class="hero" style="padding-block:var(--space-2xl) var(--space-2xl);">
    <h1>{{ ui.all_cantons }}</h1>
  </section>
  <section class="section" style="padding-top:0;">
    <div class="index-grid">
      {% for c in cantons %}
      <a class="index-cell" href="{{ c.url }}">
        <div class="name">{{ c.name }}</div>
        <div class="count">{{ c.count }} {{ ui.lawyers_in_canton }}</div>
      </a>
      {% endfor %}
      {% for c in cantons_a_venir %}
      <a class="index-cell" href="{{ c.url }}" style="opacity:0.55;">
        <div class="name">{{ c.name }}</div>
        <div class="count">{{ ui.coming_soon }}</div>
      </a>
      {% endfor %}
    </div>
  </section>
</div>
{% endblock %}
